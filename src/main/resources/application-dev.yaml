spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pigeon}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:pigeon}
    password: ${DB_PASSWORD:pigeon}
  jpa:
    hibernate:
      ddl-auto: none        # Flyway가 스키마 전담
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
